<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反応シミュレーション ステートマシン図</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Mono+Lisa&display=swap');

  :root {
    --bg: #0d0d12;
    --surface: #15151f;
    --border: #2a2a3a;
    --text: #e8e6f0;
    --muted: #7a7890;
    --accent: #c084fc;
    --accent2: #f472b6;
    --gold: #fbbf24;
    --green: #34d399;
    --red: #f87171;
    --blue: #60a5fa;
    --orange: #fb923c;
    --panel-w: 520px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ヘッダー */
  header {
    padding: 24px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: var(--surface);
  }
  .header-left {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  header span {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .head-btn {
    border: 1px solid var(--border);
    background: #1a1a27;
    color: var(--text);
    border-radius: 8px;
    height: 32px;
    padding: 0 12px;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .head-btn:hover {
    border-color: var(--accent);
    background: #202033;
  }
  .head-btn.warn {
    border-color: rgba(248,113,113,0.45);
    color: #fecaca;
  }

  /* メインレイアウト */
  .layout {
    display: flex;
    height: calc(100vh - 57px);
  }

  /* キャンバスエリア */
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  .canvas-area:active { cursor: grabbing; }

  #canvas-inner {
    position: absolute;
    width: 2400px;
    height: 1600px;
    transform-origin: 0 0;
  }

  svg#arrows {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* ノード */
  .node {
    position: absolute;
    width: 180px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    user-select: none;
  }
  .node:hover {
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(192, 132, 252, 0.2);
    transform: translateY(-2px);
    z-index: 10;
  }
  .node.active {
    border-color: var(--accent);
    box-shadow: 0 0 32px rgba(192, 132, 252, 0.35);
    z-index: 20;
  }

  .node-head {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
  }
  .node-num {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .node-name {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .node-body {
    padding: 8px 12px 10px;
  }
  .node-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* 状態ごとの色 */
  .node[data-id="Guarded"] .node-head { border-top: 3px solid #60a5fa; border-radius: 10px 10px 0 0; }
  .node[data-id="Defensive"] .node-head { border-top: 3px solid #f87171; }
  .node[data-id="Overridden"] .node-head { border-top: 3px solid #fb923c; }
  .node[data-id="FrustratedCraving"] .node-head { border-top: 3px solid #a78bfa; }
  .node[data-id="Acclimating"] .node-head { border-top: 3px solid #34d399; }
  .node[data-id="Surrendered"] .node-head { border-top: 3px solid #fbbf24; }
  .node[data-id="BrokenDown"] .node-head { border-top: 3px solid #f472b6; }
  .node[data-id="End_A"] .node-head, .node[data-id="End_B"] .node-head, .node[data-id="End_CW"] .node-head, .node[data-id="End_CO"] .node-head { border-top: 3px solid #6b7280; }

  /* エンドノード */
  .node.end-node {
    width: 140px;
    opacity: 0.75;
  }
  .node.end-node .node-name { font-size: 11px; }

  /* 矢印ラベル */
  .arrow-label {
    font-size: 11px;
    fill: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    pointer-events: all;
    cursor: pointer;
    transition: fill 0.15s;
  }
  .arrow-label:hover { fill: var(--text); }
  .arrow-label.highlighted { fill: var(--accent); }
  .arrow-label-bg {
    fill: rgba(13, 13, 18, 0.92);
    stroke: rgba(122, 120, 144, 0.35);
    stroke-width: 0.8;
    rx: 4;
    ry: 4;
    pointer-events: none;
  }
  .arrow-label-bg.highlighted {
    stroke: rgba(192, 132, 252, 0.75);
  }

  .arrow-line {
    stroke: #4a4961;
    stroke-width: 1.5;
    fill: none;
    transition: stroke 0.15s;
    stroke-linecap: round;
  }
  .arrow-line.highlighted {
    stroke: var(--accent);
    stroke-width: 2;
  }

  /* サイドパネル */
  .side-panel {
    width: var(--panel-w);
    min-width: 360px;
    max-width: 780px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .splitter {
    width: 8px;
    cursor: col-resize;
    background: linear-gradient(to right, transparent, rgba(122,120,144,0.22), transparent);
    border-left: 1px solid rgba(42,42,58,0.6);
    border-right: 1px solid rgba(42,42,58,0.6);
  }
  .splitter:hover {
    background: linear-gradient(to right, transparent, rgba(192,132,252,0.4), transparent);
  }

  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .panel-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }
  .panel-content::-webkit-scrollbar { width: 4px; }
  .panel-content::-webkit-scrollbar-track { background: transparent; }
  .panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .panel-placeholder {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.8;
    padding-top: 8px;
  }

  /* 状態詳細 */
  .state-title {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .state-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 14px 0 6px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }

  .transition-item {
    padding: 8px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    font-size: 12px;
    line-height: 1.65;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .transition-item:hover {
    background: rgba(192, 132, 252, 0.07);
    border-color: rgba(192, 132, 252, 0.4);
  }
  .rule-editor {
    padding: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .rule-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .rule-row:last-child { margin-bottom: 0; }
  .rule-row label {
    color: var(--muted);
    min-width: 56px;
  }
  .rule-input, .rule-select {
    border: 1px solid var(--border);
    background: #111421;
    color: var(--text);
    border-radius: 6px;
    font-size: 11px;
    padding: 4px 6px;
    min-height: 26px;
    width: 100%;
  }
  .rule-select { width: auto; min-width: 94px; }
  .rule-mini-btn {
    border: 1px solid var(--border);
    background: #1a1f31;
    color: var(--text);
    border-radius: 6px;
    font-size: 11px;
    height: 24px;
    padding: 0 8px;
    cursor: pointer;
  }
  .rule-mini-btn:hover { border-color: var(--accent); }
  .rule-mini-btn.warn {
    border-color: rgba(248,113,113,0.45);
    color: #fecaca;
  }
  .cond-box {
    border: 1px solid rgba(122,120,144,0.35);
    border-radius: 6px;
    padding: 6px;
    margin-top: 6px;
    background: rgba(0,0,0,0.15);
  }
  .nl-rule {
    padding: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .nl-line {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    font-size: 12px;
    line-height: 1.8;
  }
  .nl-line:last-child { margin-bottom: 0; }
  .nl-token {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.04em;
  }

  .transition-to {
    font-weight: 500;
    margin-bottom: 2px;
  }
  .transition-cond {
    color: var(--muted);
    font-size: 11px;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 3px;
    margin-bottom: 2px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .tag-band { background: rgba(96,165,250,0.15); color: #93c5fd; }
  .tag-param { background: rgba(52,211,153,0.15); color: #6ee7b7; }
  .tag-time { background: rgba(251,191,36,0.15); color: #fcd34d; }
  .tag-end { background: rgba(107,114,128,0.15); color: #9ca3af; }

  .threshold-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-top: 4px;
  }
  .threshold-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 400;
    padding: 3px 6px;
    border-bottom: 1px solid var(--border);
  }
  .threshold-table td {
    padding: 4px 6px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    color: var(--accent);
    font-weight: 500;
  }
  .threshold-table td:first-child { color: var(--text); font-weight: 400; }
  .tol-panel {
    margin-top: 8px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
  }
  .tol-track {
    position: relative;
    height: 20px;
    border-radius: 4px;
    background: #1c1e2a;
    border: 1px solid rgba(122,120,144,0.35);
    overflow: hidden;
  }
  .tol-below  { position:absolute; top:0; left:0; height:100%; background:rgba(96,165,250,.35); }
  .tol-within { position:absolute; top:0; height:100%; background:rgba(52,211,153,.45); }
  .tol-above  { position:absolute; top:0; height:100%; background:rgba(248,113,113,.35); }
  .tol-tick {
    position:absolute;
    top:-14px;
    transform:translateX(-50%);
    font-size:9px;
    color:var(--muted);
    font-family:'Mono Lisa', monospace;
    white-space:nowrap;
  }
  .tol-inputs { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .tol-slider-row {
    display:grid;
    grid-template-columns: 56px 1fr 52px;
    align-items:center;
    gap:10px;
  }
  .tol-slider-label { font-size: 11px; color: var(--muted); }
  .tol-slider-val { font-size: 11px; color: var(--muted); text-align: right; font-family:'Mono Lisa', monospace; }
  .tol-actions {
    margin-top: 10px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  /* ズームコントロール */
  .zoom-controls {
    position: absolute;
    bottom: 16px;
    left: 16px;
    display: flex;
    gap: 6px;
    z-index: 100;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .zoom-btn:hover { background: var(--border); }

  .hint {
    position: absolute;
    bottom: 16px;
    right: 16px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>反応シミュレーション — ステートマシン図</h1>
    <span id="bridge-status">StateTransitionConfig未同期（ローカル表示）</span>
  </div>
  <div class="header-actions">
    <button class="head-btn" id="btn-load-bridge">Unity Bridge JSON読込</button>
    <button class="head-btn" id="btn-export-bridge">Unity Bridge JSON書出</button>
    <button class="head-btn warn" id="btn-reset-static">表示初期値に戻す</button>
    <input type="file" id="bridge-file-input" accept=".json,application/json" style="display:none;">
    <input type="file" id="tol-bridge-file-input" accept=".json,application/json" style="display:none;">
  </div>
</header>

<div class="layout">
  <div class="canvas-area" id="canvas">
    <div id="canvas-inner">
      <svg id="arrows">
        <defs>
          <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto" markerUnits="strokeWidth">
            <polygon points="0 0, 6 2, 0 4" fill="#6e7a94"/>
          </marker>
          <marker id="arrowhead-accent" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto" markerUnits="strokeWidth">
            <polygon points="0 0, 6 2, 0 4" fill="#c084fc"/>
          </marker>
        </defs>
      </svg>
    </div>

    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-out">−</button>
      <button class="zoom-btn" id="zoom-reset" style="width:auto;padding:0 10px;font-size:10px;letter-spacing:.05em;">FIT</button>
    </div>
    <div class="hint">ドラッグでパン　ノードをクリックで詳細</div>
  </div>

  <div class="splitter" id="panel-splitter" title="ドラッグで右パネル幅を調整"></div>

  <div class="side-panel">
    <div class="panel-header">State Detail</div>
    <div class="panel-content" id="panel-content">
      <p class="panel-placeholder">ノードをクリックすると<br>状態の詳細と遷移条件が<br>表示されます。</p>
    </div>
  </div>
</div>

<script>
// ─── データ定義 ───────────────────────────────────────────────
const STATES = {
  Guarded: {
    id: "Guarded", num: "①", name: "Guarded", desc: "心を閉ざしニヤッとしている",
    x: 180, y: 180,
    tolLow: 0.35, tolHigh: 0.65,
    detail: "拘束されて冷や汗をかきながらも、心を閉ざしてニヤッとしている。初期状態。",
    transitions: [
      { to: "Defensive", label: "→② Defensive", cond: "Resistance ≥ 0.8", tags: [["param","Resistance↑"]] },
      { to: "Defensive", label: "→② Defensive", cond: "Above継続 5s", tags: [["band","Above"],["time","5s"]] },
      { to: "Acclimating", label: "→⑤ Acclimating", cond: "Within継続 8s + Arousal ≥ 0.4", tags: [["band","Within"],["time","8s"],["param","Arousal↑"]] },
      { to: "Acclimating", label: "→⑤ Acclimating", cond: "Below継続 5s + Arousal ≥ 0.4", tags: [["band","Below"],["time","5s"],["param","Arousal↑"]] },
    ]
  },
  Defensive: {
    id: "Defensive", num: "②", name: "Defensive", desc: "不機嫌・防衛モード",
    x: 520, y: 180,
    tolLow: 0.55, tolHigh: 0.85,
    detail: "乱暴に扱われて心を閉ざした不機嫌状態。",
    transitions: [
      { to: "Guarded", label: "→① Guarded", cond: "Resistance ≤ 0.4", tags: [["param","Resistance↓"]] },
      { to: "Overridden", label: "→③ Overridden", cond: "Fatigue ≥ 0.9 + Drive ≥ 0.7", tags: [["param","Fatigue↑"],["param","Drive↑"]] },
      { to: "FrustratedCraving", label: "→④ FrustratedCraving", cond: "Stop継続 5s + Drive ≥ 0.7", tags: [["band","Stop"],["time","5s"],["param","Drive↑"]] },
      { to: "FrustratedCraving", label: "→④ FrustratedCraving", cond: "Below継続 5s + Drive ≥ 0.7", tags: [["band","Below"],["time","5s"],["param","Drive↑"]] },
    ]
  },
  Overridden: {
    id: "Overridden", num: "③", name: "Overridden", desc: "強い快感で押し切られて射精",
    x: 860, y: 180,
    tolLow: 0.30, tolHigh: 0.70,
    detail: "強い快感で押し切られて射精する。Fatigue蓄積・DriveBias+方向。",
    transitions: [
      { to: "Defensive", label: "→② Defensive", cond: "Arousal ≤ 0.35 + Fatigue ≤ 0.9", tags: [["param","Arousal↓"],["param","Fatigue↓"]] },
      { to: "Acclimating", label: "→⑤ Acclimating", cond: "Arousal ≥ 0.4 + Fatigue ≤ 0.9", tags: [["param","Arousal↑"],["param","Fatigue↓"]] },
      { to: "FrustratedCraving", label: "→④ FrustratedCraving", cond: "Below継続 5s + Drive ≥ 0.7", tags: [["band","Below"],["time","5s"],["param","Drive↑"]] },
      { to: "End_A", label: "→END_A", cond: "射精 ≥ 2回 + Fatigue ≥ 0.9", tags: [["end","2回射精"],["param","Fatigue↑"]] },
    ]
  },
  FrustratedCraving: {
    id: "FrustratedCraving", num: "④", name: "FrustratedCraving", desc: "困惑・お預け状態",
    x: 520, y: 500,
    tolLow: 0.25, tolHigh: 0.55,
    detail: "強い刺激の後に急に弱くなり、精神は閉ざしているのに体が求めてしまう困惑状態。",
    transitions: [
      { to: "Acclimating", label: "→⑤ Acclimating", cond: "Fatigue ≥ 0.7", tags: [["param","Fatigue↑"]] },
      { to: "Acclimating", label: "→⑤ Acclimating", cond: "Resistance ≤ 0.4 + Arousal ≥ 0.4", tags: [["param","Resistance↓"],["param","Arousal↑"]] },
      { to: "Surrendered", label: "→⑥ Surrendered", cond: "Within継続 5s + Drive ≥ 0.7", tags: [["band","Within"],["time","5s"],["param","Drive↑"]] },
      { to: "Surrendered", label: "→⑥ Surrendered", cond: "Below継続 5s + Arousal ≥ 0.65", tags: [["band","Below"],["time","5s"],["param","Arousal↑"]] },
    ]
  },
  Acclimating: {
    id: "Acclimating", num: "⑤", name: "Acclimating", desc: "馴化・快楽受け入れ",
    x: 860, y: 500,
    tolLow: 0.30, tolHigh: 0.70,
    detail: "心理的ガードが下がり、身体が快楽を受け入れていく状態。",
    transitions: [
      { to: "Surrendered", label: "→⑥ Surrendered", cond: "Within継続 8s + Arousal ≥ 0.65", tags: [["band","Within"],["time","8s"],["param","Arousal↑"]] },
      { to: "Surrendered", label: "→⑥ Surrendered", cond: "Below継続 5s + Arousal ≥ 0.65", tags: [["band","Below"],["time","5s"],["param","Arousal↑"]] },
      { to: "BrokenDown", label: "→⑦ BrokenDown", cond: "Above継続 5s + Drive ≥ 0.7 + Arousal ≥ 0.6", tags: [["band","Above"],["time","5s"],["param","Drive↑"],["param","Arousal↑"]] },
    ]
  },
  Surrendered: {
    id: "Surrendered", num: "⑥", name: "Surrendered", desc: "通常快楽落ち",
    x: 960, y: 740,
    tolLow: 0.20, tolHigh: 0.80,
    detail: "許容値が広くなり、なんでも気持ちよくなる状態。",
    transitions: [
      { to: "BrokenDown", label: "→⑦ BrokenDown", cond: "Below継続 5s + Drive ≥ 0.7 + Arousal ≥ 0.6", tags: [["band","Below"],["time","5s"],["param","Drive↑"],["param","Arousal↑"]] },
      { to: "End_B", label: "→END_B", cond: "射精 ≥ 2回 + Fatigue ≥ 0.9", tags: [["end","2回射精"],["param","Fatigue↑"]] },
    ]
  },
  BrokenDown: {
    id: "BrokenDown", num: "⑦", name: "BrokenDown", desc: "理性崩壊・サービスタイム",
    x: 1080, y: 940,
    tolLow: 0.05, tolHigh: 0.95,

const NODE_W = 180, NODE_H = 72, END_W = 140, END_H = 58;
const DEFAULT_TRANSITIONS_BY_STATE = {};
Object.keys(STATES).forEach(id => {
  DEFAULT_TRANSITIONS_BY_STATE[id] = (STATES[id].transitions || []).map(tr => ({
    to: tr.to,
    label: tr.label,
    cond: tr.cond,
    tags: (tr.tags || []).map(t => [t[0], t[1]])
  }));
});

const STATE_IDS = Object.keys(STATES);
const EDITABLE_STATE_IDS = STATE_IDS.filter(id => !STATES[id].isEnd);
const STATE_ID_TO_ENUM = { End_CW: "End_C_White", End_CO: "End_C_Overload" };
const ENUM_TO_STATE_ID = { End_C_White: "End_CW", End_C_Overload: "End_CO" };
const PARAM_LABEL = {
  Arousal: "Arousal",
  Resistance: "Resistance",
  Fatigue: "Fatigue",
  Drive: "Drive",
  OrgasmCount: "射精回数",
  DriveBias: "DriveBias",
  BrokenDownMode: "崩壊モード"
};
const OP_LABEL = {
  GreaterEqual: "≥",
  LessEqual: "≤",
  GreaterThan: ">",
  LessThan: "<"
};
const OP_LABEL_JA = {
  GreaterEqual: "以上",
  LessEqual: "以下",
  GreaterThan: "超える",
  LessThan: "未満"
};
const BAND_LABEL = {
  Any: "Any",
  Stop: "Stop",
  Below: "Below",
  Within: "Within",
  Above: "Above"
};
const BAND_LABEL_JA = {
  Any: "問わない",
  Stop: "停止中(Stop)",
  Below: "Below帯",
  Within: "Within帯",
  Above: "Above帯"
};

let bridgeRules = [];
let bridgeMode = false;
const BRIDGE_DRAFT_KEY = "state_machine_bridge_draft_v1";
const TOL_DRAFT_KEY = "state_machine_tol_draft_v1";

function stateIdFromAny(raw) {
  if (!raw) return "";
  return ENUM_TO_STATE_ID[raw] || raw;
}

function enumStateFromId(raw) {
  if (!raw) return "";
  return STATE_ID_TO_ENUM[raw] || raw;
}

function normalizeRule(rule) {
  const conditions = Array.isArray(rule.conditions) ? rule.conditions : [];
  return {
    enabled: rule.enabled !== false,
    note: rule.note || "",
    fromState: stateIdFromAny(rule.fromState || "Guarded"),
    toState: stateIdFromAny(rule.toState || "Defensive"),
    requiredBand: BAND_LABEL[rule.requiredBand] ? rule.requiredBand : "Any",
    bandDuration: Number.isFinite(Number(rule.bandDuration)) ? Math.max(0, Number(rule.bandDuration)) : 0,
    conditions: conditions.map(c => {
      const param = PARAM_LABEL[c.param] ? c.param : "Arousal";
      return {
        param,
        op: OP_LABEL[c.op] ? c.op : "GreaterEqual",
        threshold: sanitizeThreshold(param, c.threshold)
      };
    })
  };
}

function getThresholdConfig(param) {
  switch (param) {
    case "OrgasmCount":
      return { min: 1, max: 99, step: 1, def: 1, integer: true };
    case "DriveBias":
      return { min: -1, max: 1, step: 0.01, def: 0, integer: false };
    case "BrokenDownMode":
      return { min: 0, max: 2, step: 1, def: 0, integer: true };
    case "Arousal":
    case "Resistance":
    case "Fatigue":
    case "Drive":
      return { min: 0, max: 1, step: 0.01, def: 0.5, integer: false };
    default:
      return { min: -9999, max: 9999, step: 0.01, def: 0.5, integer: false };
  }
}

function decimalsFromStep(step) {
  const s = String(step);
  const i = s.indexOf(".");
  return i < 0 ? 0 : (s.length - i - 1);
}

function sanitizeThreshold(param, rawValue) {
  const cfg = getThresholdConfig(param);
  let v = Number(rawValue);
  if (!Number.isFinite(v)) v = cfg.def;
  v = Math.max(cfg.min, Math.min(cfg.max, v));
  if (cfg.integer) {
    v = Math.round(v);
  } else {
    const d = decimalsFromStep(cfg.step);
    v = Number(v.toFixed(Math.max(0, d)));
  }
  return v;
}

function thresholdInputValue(param, rawValue) {
  const v = sanitizeThreshold(param, rawValue);
  return String(v);
}

function formatThreshold(cond) {
  if (cond.param === "OrgasmCount") return `${Math.round(cond.threshold)}回`;
  if (cond.param === "BrokenDownMode") {
    const v = Math.round(cond.threshold);
    if (v === 1) return "アヘ顔";
    if (v === 2) return "トロトロ";
    return "None";
  }
  if (Math.abs(cond.threshold) >= 10 || Number.isInteger(cond.threshold)) return `${cond.threshold}`;
  return `${Number(cond.threshold).toFixed(2)}`;
}

function formatRuleCond(rule) {
  const parts = [];
  if (rule.requiredBand !== "Any") {
    const b = rule.requiredBand;
    if (rule.bandDuration > 0) {
      const sec = Number.isInteger(rule.bandDuration) ? rule.bandDuration : rule.bandDuration.toFixed(1);
      parts.push(`${b}継続 ${sec}s`);
    } else {
      parts.push(`${b}条件`);
    }
  }
  if (rule.conditions.length > 0) {
    rule.conditions.forEach(c => {
      parts.push(`${PARAM_LABEL[c.param] || c.param} ${OP_LABEL_JA[c.op] || c.op} ${formatThreshold(c)}`);
    });
  }
  return parts.length > 0 ? parts.join(" + ") : "常時";
}

function tagsFromRule(rule) {
  const tags = [];
  if (rule.requiredBand !== "Any") tags.push(["band", rule.requiredBand]);
  if (rule.bandDuration > 0) tags.push(["time", `${rule.bandDuration}s`]);
  rule.conditions.forEach(c => {
    if (c.param === "OrgasmCount") tags.push(["end", "射精"]);
    else tags.push(["param", PARAM_LABEL[c.param] || c.param]);
  });
  return tags;
}

function rebuildStatesFromBridgeRules() {
  STATE_IDS.forEach(id => {
    STATES[id].transitions = [];
  });
  bridgeRules.forEach(rule => {
    const from = rule.fromState;
    if (!STATES[from]) return;
    STATES[from].transitions.push({
      to: rule.toState,
      label: `→ ${rule.toState}`,
      cond: formatRuleCond(rule),
      tags: tagsFromRule(rule),
      _rule: rule
    });
  });
  rebuildArrowsFromStates();
}

function resetToStaticTransitions() {
  bridgeMode = false;
  bridgeRules = [];
  try { localStorage.removeItem(BRIDGE_DRAFT_KEY); } catch (_) {}
  STATE_IDS.forEach(id => {
    STATES[id].transitions = (DEFAULT_TRANSITIONS_BY_STATE[id] || []).map(tr => ({
      to: tr.to,
      label: tr.label,
      cond: tr.cond,
      tags: (tr.tags || []).map(t => [t[0], t[1]])
    }));
  });
  rebuildArrowsFromStates();
  updateBridgeStatus("StateTransitionConfig未同期（ローカル表示）");
}

function persistTolDraft() {
  const root = buildTolBridgeRoot();
  try { localStorage.setItem(TOL_DRAFT_KEY, JSON.stringify(root)); } catch (_) {}
}

function tryRestoreTolDraft() {
  let raw = "";
  try { raw = localStorage.getItem(TOL_DRAFT_KEY) || ""; } catch (_) {}
  if (!raw) return false;
  try {
    const parsed = JSON.parse(raw);
    return applyTolBridgeRoot(parsed) > 0;
  } catch (_) {
    return false;
  }
}

function persistBridgeDraft() {
  if (!bridgeMode) return;
  const root = {
    version: "state-machine-bridge-v1",
    rules: bridgeRules.map(r => ({
      enabled: r.enabled,
      note: r.note || "",
      fromState: r.fromState,
      toState: r.toState,
      requiredBand: r.requiredBand,
      bandDuration: r.bandDuration,
      conditions: (r.conditions || []).map(c => ({
        param: c.param,
        op: c.op,
        threshold: c.threshold
      }))
    }))
  };
  try { localStorage.setItem(BRIDGE_DRAFT_KEY, JSON.stringify(root)); } catch (_) {}
}

function tryRestoreBridgeDraft() {
  let raw = "";
  try { raw = localStorage.getItem(BRIDGE_DRAFT_KEY) || ""; } catch (_) {}
  if (!raw) return false;
  try {
    const parsed = JSON.parse(raw);
    const rules = Array.isArray(parsed.rules) ? parsed.rules : null;
    if (!rules) return false;
    bridgeRules = rules.map(r => normalizeRule(r)).filter(r => STATES[r.fromState] && STATES[r.toState]);
    bridgeMode = true;
    rebuildStatesFromBridgeRules();
    updateBridgeStatus(`StateTransitionConfig同期中（復元: ${bridgeRules.length} rules）`);
    return true;
  } catch (_) {
    return false;
  }
}

function updateBridgeStatus(text) {
  const el = document.getElementById("bridge-status");
  if (el) el.textContent = text;
}

// ─── 矢印描画 ───────────────────────────────────────────────
function getCenter(id) {
  const s = STATES[id];
  const w = s.isEnd ? END_W : NODE_W;
  const h = s.isEnd ? END_H : NODE_H;
  return { x: s.x + w/2, y: s.y + h/2, w, h };
}

function getEdgePoint(fromId, toId) {
  const f = getCenter(fromId), t = getCenter(toId);
  const dx = t.x - f.x, dy = t.y - f.y;
  const ang = Math.atan2(dy, dx);
  const hw = f.w/2 + 4, hh = f.h/2 + 4;
  const tx = Math.abs(Math.cos(ang)) > 0.0001 ? Math.min(Math.abs(hw / Math.cos(ang)), Math.abs(hh / Math.sin(ang))) : Math.abs(hh / Math.sin(ang));
  return { x: f.x + Math.cos(ang)*tx, y: f.y + Math.sin(ang)*tx };
}

let arrowData = [];
let arrowIdxMap = {};

function rebuildArrowsFromStates() {
  arrowData = [];
  arrowIdxMap = {};
  const seenEdge = new Set();

  Object.values(STATES).forEach(s => {
    s.transitions.forEach((tr, ti) => {
      const from = s.id, to = tr.to;
      if (!STATES[to]) return;
      const dedupeKey = `${from}__${to}__${tr.cond}__${ti}`;
      if (seenEdge.has(dedupeKey)) return;
      seenEdge.add(dedupeKey);

      const key = `${from}-${to}-${ti}`;
      arrowData.push({ from, to, tr, key });
      if (!arrowIdxMap[from]) arrowIdxMap[from] = [];
      arrowIdxMap[from].push(key);
    });
  });

  const pairCount = {};
  const undirMap = {};
  arrowData.forEach(a => {
    const pk = `${a.from}_${a.to}`;
    const uk = [a.from, a.to].sort().join("_");
    pairCount[pk] = (pairCount[pk] || 0) + 1;
    if (!undirMap[uk]) undirMap[uk] = { fwd: false, rev: false };
    const first = a.from < a.to ? "fwd" : "rev";
    undirMap[uk][first] = true;
  });

  const pairIdx = {};
  arrowData.forEach(a => {
    const pk = `${a.from}_${a.to}`;
    const uk = [a.from, a.to].sort().join("_");
    pairIdx[pk] = (pairIdx[pk] || 0);
    a.pairN = pairCount[pk];
    a.pairI = pairIdx[pk]++;
    const info = undirMap[uk];
    a.hasReverse = info.fwd && info.rev;
    a.dirSign = a.from < a.to ? -1 : 1;
  });
}

function drawArrows(highlightKeys = []) {
  // clear（defsは保持する）
  Array.from(svg.children).forEach(el => {
    if (el.tagName.toLowerCase() !== 'defs') el.remove();
  });

  // 何らかの理由でdefsが消えていた場合のフェイルセーフ
  if (!svg.querySelector('#arrowhead') || !svg.querySelector('#arrowhead-accent')) {
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `
      <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto" markerUnits="strokeWidth">
        <polygon points="0 0, 6 2, 0 4" fill="#6e7a94"></polygon>
      </marker>
      <marker id="arrowhead-accent" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto" markerUnits="strokeWidth">
        <polygon points="0 0, 6 2, 0 4" fill="#c084fc"></polygon>
      </marker>`;
    svg.prepend(defs);
  }

  // ノード背面に矢印を描くため、終点を少し手前にして矢印頭を見える位置に出す
  const ARROW_HEAD_GAP = 6;

  const manualDetourByKey = {};
  const manualAlongByKey = {};

  // ラベル重なり軽減: 同じノードから同方向へ出る矢印群で縦位置をずらす
  const labelLaneMap = {};
  arrowData.forEach(a => {
    const fromC = getCenter(a.from);
    const toC = getCenter(a.to);
    const dx = toC.x - fromC.x;
    const dy = toC.y - fromC.y;
    let dir;
    if (Math.abs(dx) > Math.abs(dy) * 1.25) {
      dir = dx >= 0 ? 'R' : 'L';
    } else if (Math.abs(dy) > Math.abs(dx) * 1.25) {
      dir = dy >= 0 ? 'D' : 'U';
    } else {
      dir = (dx >= 0 ? 'R' : 'L') + (dy >= 0 ? 'D' : 'U');
    }
    const laneKey = `${a.from}_${dir}`;
    if (!labelLaneMap[laneKey]) labelLaneMap[laneKey] = [];
    labelLaneMap[laneKey].push(a.key);
  });

  const labelLanePos = {};
  Object.values(labelLaneMap).forEach(keys => {
    keys.forEach((key, idx) => {
      labelLanePos[key] = { i: idx, n: keys.length };
    });
  });

  arrowData.forEach(a => {
    const fp = getEdgePoint(a.from, a.to);
    const tpRaw = getEdgePoint(a.to, a.from);
    const hi = highlightKeys.includes(a.key);

    const vx = tpRaw.x - fp.x;
    const vy = tpRaw.y - fp.y;
    const vLen = Math.sqrt(vx * vx + vy * vy) || 1;
    const ux = vx / vLen;
    const uy = vy / vLen;
    const tp = {
      x: tpRaw.x - ux * ARROW_HEAD_GAP,
      y: tpRaw.y - uy * ARROW_HEAD_GAP
    };

    // オフセットカーブ
    const mx = (fp.x + tp.x) / 2;
    const my = (fp.y + tp.y) / 2;
    const dx = tp.x - fp.x, dy = tp.y - fp.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const directedOffset = (a.pairI - (a.pairN - 1) / 2) * 28;
    const reverseOffset = a.hasReverse ? a.dirSign * 14 : 0;

    // ⑤→⑦ は ⑥ の背後を通りやすいので大きく迂回
    let manualDetour = manualDetourByKey[a.key] ?? 0;
    if (a.from === 'Acclimating' && a.to === 'BrokenDown')
      manualDetour += -200;
    const manualAlong = manualAlongByKey[a.key] ?? 0;

    const offset = directedOffset + reverseOffset + manualDetour;
    const cx = mx + (dx / len) * manualAlong - (dy / len) * offset;
    const cy = my + (dy / len) * manualAlong + (dx / len) * offset;

    // 線
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${fp.x},${fp.y} Q${cx},${cy} ${tp.x},${tp.y}`);
    path.setAttribute('class', 'arrow-line' + (hi ? ' highlighted' : ''));
    path.setAttribute('marker-end', hi ? 'url(#arrowhead-accent)' : 'url(#arrowhead)');
    svg.appendChild(path);

    // ラベル背景 + テキスト
    const lane = labelLanePos[a.key] || { i: 0, n: 1 };
    const laneYOffset = (lane.i - (lane.n - 1) / 2) * 14;
    const lx = cx;
    const ly = cy + laneYOffset;
    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', lx);
    label.setAttribute('y', ly);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('dominant-baseline','middle');
    label.setAttribute('class', 'arrow-label' + (hi ? ' highlighted' : ''));

    // 条件は省略せず、そのまま表示
    label.textContent = a.tr.cond;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.appendChild(label);
    svg.appendChild(g);

    const box = label.getBBox();
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', (box.x - 4).toString());
    bg.setAttribute('y', (box.y - 2).toString());
    bg.setAttribute('width', (box.width + 8).toString());
    bg.setAttribute('height', (box.height + 4).toString());
    bg.setAttribute('class', 'arrow-label-bg' + (hi ? ' highlighted' : ''));
    g.insertBefore(bg, label);
  });
}

function makeShortLabel(tr) {
  const cond = tr.cond;
  if (cond.includes('Resistance ≥') || cond.includes('Resistance↑')) return 'Resistance↑';
  if (cond.includes('Resistance ≤') || cond.includes('Resistance↓')) return 'Resistance↓';
  if (cond.includes('Fatigue ≥') && cond.includes('Drive ≥')) return 'Fatigue↑ + Drive↑';
  if (cond.includes('Fatigue ≤') && cond.includes('Arousal ≤')) return 'Fatigue↓ + Arousal↓';
  if (cond.includes('Fatigue ≤') && cond.includes('Arousal ≥')) return 'Fatigue↓ + Arousal↑';
  if (cond.includes('Fatigue ≥') && !cond.includes('Drive')) return 'Fatigue↑';
  if (cond.includes('Drive ≥') && cond.includes('Above')) return 'Drive↑ + Above t';
  if (cond.includes('Drive ≥') && cond.includes('Below')) return 'Drive↑ + Below t';
  if (cond.includes('Below') && cond.includes('Drive or Arousal')) return 'Below t + D/A↑';
  if (cond.includes('Below') && cond.includes('Drive')) return 'Below t + Drive↑';
  if (cond.includes('Below') && cond.includes('Arousal')) return 'Below t + Arousal↑';
  if (cond.includes('Within') && cond.includes('Arousal')) return 'Within + Arousal↑';
  if (cond.includes('Within')) return 'Within 安定';
  if (cond.includes('Below')) return 'Below t';
  if (cond.includes('射精') && cond.includes('Fatigue')) return tr.label.split('→')[0] + '射精+Fatigue↑';
  if (cond.includes('DriveBias')) return cond.includes('<') ? 'DriveBias−' : 'DriveBias+';
  return tr.cond.slice(0, 18) + '…';
}

// ─── 状態選択・パネル表示 ────────────────────────────────────
let selectedId = null;

function selectState(id) {
  selectedId = id;
  // ノードhighlight
  Object.values(nodeEls).forEach(el => el.classList.remove('active'));
  nodeEls[id].classList.add('active');

  // 矢印highlight
  const keys = (arrowIdxMap[id] || []).concat(
    arrowData.filter(a => a.to === id).map(a => a.key)
  );
  drawArrows(keys);

  // パネル更新
  renderPanel(id);
}

function renderPanel(id) {
  const s = STATES[id];
  const panel = document.getElementById('panel-content');

  const tagHTML = (tags) => tags.map(([type, label]) =>
    `<span class="tag tag-${type}">${label}</span>`
  ).join('');

  const transHTML = bridgeMode
    ? renderBridgeRuleEditors(id)
    : (s.transitions.map((tr) => {
      const toS = STATES[tr.to];
      return `<div class="transition-item">
        <div class="transition-to">${toS ? toS.num + ' ' + toS.name : tr.to}</div>
        <div class="transition-cond">${tr.cond}</div>
        <div style="margin-top:4px">${tagHTML(tr.tags)}</div>
      </div>`;
    }).join('') || '<div style="color:var(--muted);font-size:11px">遷移なし（終端状態）</div>');

  const threshHTML = !s.isEnd ? `
    <div class="section-label">Threshold</div>
    <table class="threshold-table">
      <tr><th>TolLow</th><th>TolHigh</th></tr>
      <tr><td>TolLow</td><td>${Number(s.tolLow).toFixed(2)}</td></tr>
      <tr><td>TolHigh</td><td>${Number(s.tolHigh).toFixed(2)}</td></tr>
    </table>
    ${renderTolEditor(id)}
    ` : '';

  // 自分への遷移（入ってくる矢印）
  const incoming = arrowData.filter(a => a.to === id);
  const inHTML = incoming.length ? incoming.map(a => {
    const fromS = STATES[a.from];
    return `<div style="font-size:10px;color:var(--muted);padding:3px 0;">${fromS.num} ${fromS.name} から：<br><span style="color:var(--text)">${a.tr.cond}</span></div>`;
  }).join('') : '<div style="font-size:10px;color:var(--muted)">初期状態</div>';

  panel.innerHTML = `
    <div class="state-title">${s.num} ${s.name}</div>
    <div class="state-subtitle">${s.detail}</div>
    ${threshHTML}
    <div class="section-label">Outgoing Transitions（出ていく遷移）</div>
    ${transHTML}
    ${bridgeMode && !s.isEnd ? `<div style="margin-top:8px;"><button class="head-btn" style="height:28px;" onclick="addRuleFromState('${id}')">＋ ルール追加</button></div>` : ''}
    <div class="section-label">Incoming（この状態に入ってくる経路）</div>
    ${inHTML}
  `;
}

function findBridgeRuleByStateIndex(stateId, idx) {
  const trs = STATES[stateId].transitions || [];
  if (!trs[idx] || !trs[idx]._rule) return null;
  return trs[idx]._rule;
}

function clampTolPair(lowRaw, highRaw) {
  let low = Number(lowRaw);
  let high = Number(highRaw);
  if (!Number.isFinite(low)) low = 0.3;
  if (!Number.isFinite(high)) high = 0.7;
  low = Math.max(0, Math.min(1, low));
  high = Math.max(0, Math.min(1, high));
  if (high < low + 0.01) {
    if (low <= 0.99) high = Math.min(1, low + 0.01);
    else {
      high = 1;
      low = Math.max(0, high - 0.01);
    }
  }
  low = Number(low.toFixed(2));
  high = Number(high.toFixed(2));
  return { low, high };
}

function renderTolEditor(stateId) {
  const s = STATES[stateId];
  if (!s || s.isEnd) return "";
  const p = clampTolPair(s.tolLow, s.tolHigh);
  s.tolLow = p.low;
  s.tolHigh = p.high;
  const lowPct = p.low * 100;
  const withinPct = (p.high - p.low) * 100;
  const highPct = (1 - p.high) * 100;
  return `
    <div class="tol-panel">
      <div class="tol-track">
        <div class="tol-below" style="width:${lowPct}%"></div>
        <div class="tol-within" style="left:${lowPct}%;width:${withinPct}%"></div>
        <div class="tol-above" style="left:${p.high * 100}%;width:${highPct}%"></div>
        <div class="tol-tick" style="left:${lowPct}%">${p.low.toFixed(2)}</div>
        <div class="tol-tick" style="left:${p.high * 100}%">${p.high.toFixed(2)}</div>
      </div>
      <div class="tol-inputs">
        <div class="tol-slider-row">
          <div class="tol-slider-label">TolLow</div>
          <input type="range" min="0" max="1" step="0.01" value="${p.low}" oninput="setTolLow('${stateId}', this.value)">
          <div class="tol-slider-val">${p.low.toFixed(2)}</div>
        </div>
        <div class="tol-slider-row">
          <div class="tol-slider-label">TolHigh</div>
          <input type="range" min="0" max="1" step="0.01" value="${p.high}" oninput="setTolHigh('${stateId}', this.value)">
          <div class="tol-slider-val">${p.high.toFixed(2)}</div>
        </div>
      </div>
      <div class="tol-actions">
        <button class="rule-mini-btn" onclick="openTolBridgeFile()">Tol: Unity/Dashboard JSON読込</button>
        <button class="rule-mini-btn" onclick="exportTolBridgeJson()">Tol: Unity連携JSON書出</button>
      </div>
    </div>
  `;
}

function setTolLow(stateId, value) {
  const s = STATES[stateId];
  if (!s || s.isEnd) return;
  const p = clampTolPair(value, s.tolHigh);
  s.tolLow = p.low;
  s.tolHigh = p.high;
  persistTolDraft();
  if (selectedId === stateId) renderPanel(stateId);
}

function setTolHigh(stateId, value) {
  const s = STATES[stateId];
  if (!s || s.isEnd) return;
  const p = clampTolPair(s.tolLow, value);
  s.tolLow = p.low;
  s.tolHigh = p.high;
  persistTolDraft();
  if (selectedId === stateId) renderPanel(stateId);
}

function buildTolBridgeRoot() {
  return {
    version: "state-machine-tol-bridge-v1",
    states: EDITABLE_STATE_IDS.map(id => ({
      id,
      tolLow: clampTolPair(STATES[id].tolLow, STATES[id].tolHigh).low,
      tolHigh: clampTolPair(STATES[id].tolLow, STATES[id].tolHigh).high
    }))
  };
}

function exportTolBridgeJson() {
  const root = buildTolBridgeRoot();
  const blob = new Blob([JSON.stringify(root, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "state_machine_tol_bridge.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function applyTolBridgeRoot(parsed) {
  const list = Array.isArray(parsed?.states) ? parsed.states : [];
  if (list.length === 0) return 0;
  let count = 0;
  list.forEach(st => {
    const id = stateIdFromAny(st?.id || "");
    if (!STATES[id] || STATES[id].isEnd) return;
    const p = clampTolPair(st.tolLow, st.tolHigh);
    STATES[id].tolLow = p.low;
    STATES[id].tolHigh = p.high;
    count += 1;
  });
  if (count > 0) persistTolDraft();
  return count;
}

function openTolBridgeFile() {
  document.getElementById("tol-bridge-file-input").click();
}

function escHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function buildStateOptions(selected) {
  return STATE_IDS.map(id => `<option value="${id}" ${id === selected ? "selected" : ""}>${id}</option>`).join("");
}

function buildBandOptions(selected) {
  return Object.keys(BAND_LABEL).map(k => `<option value="${k}" ${k === selected ? "selected" : ""}>${BAND_LABEL_JA[k] || k}</option>`).join("");
}

function buildParamOptions(selected) {
  return Object.keys(PARAM_LABEL).map(k => `<option value="${k}" ${k === selected ? "selected" : ""}>${PARAM_LABEL[k]}</option>`).join("");
}

function buildOpOptions(selected) {
  return Object.keys(OP_LABEL).map(k => `<option value="${k}" ${k === selected ? "selected" : ""}>${OP_LABEL_JA[k]}</option>`).join("");
}

function renderBridgeRuleEditors(stateId) {
  if (!bridgeMode) return "";
  const trs = STATES[stateId].transitions || [];
  if (trs.length === 0) return '<div style="color:var(--muted);font-size:11px">遷移なし</div>';
  return trs.map((tr, idx) => {
    const rule = tr._rule;
    if (!rule) return "";
    const conds = (rule.conditions || []).map((c, cidx) => `
      <div class="cond-box">
        <div class="nl-line">
          <span class="nl-token">条件${cidx + 1}</span>
          <select class="rule-select" onchange="setConditionParam('${stateId}', ${idx}, ${cidx}, this.value)">
            ${buildParamOptions(c.param)}
          </select>
          <span class="nl-token">が</span>
          <select class="rule-select" onchange="setConditionOp('${stateId}', ${idx}, ${cidx}, this.value)">
            ${buildOpOptions(c.op)}
          </select>
          <input
            class="rule-input"
            style="max-width:120px;"
            type="number"
            min="${getThresholdConfig(c.param).min}"
            max="${getThresholdConfig(c.param).max}"
            step="${getThresholdConfig(c.param).step}"
            value="${thresholdInputValue(c.param, c.threshold)}"
            onchange="setConditionThreshold('${stateId}', ${idx}, ${cidx}, this.value)"
          >
          <span class="nl-token">のとき</span>
          <button class="rule-mini-btn warn" onclick="removeRuleCondition('${stateId}', ${idx}, ${cidx})">条件削除</button>
        </div>
      </div>
    `).join("");

    return `
      <div class="nl-rule">
        <div class="nl-line">
          <span class="nl-token">ルール${idx + 1}</span>
          <label style="min-width:auto;">
            <input type="checkbox" ${rule.enabled ? "checked" : ""} onchange="setRuleEnabled('${stateId}', ${idx}, this.checked)"> 有効
          </label>
          <span class="nl-token"> / ${stateId} から</span>
          <select class="rule-select" onchange="setRuleToState('${stateId}', ${idx}, this.value)">
            ${buildStateOptions(rule.toState)}
          </select>
          <span class="nl-token">へ遷移</span>
          <button class="rule-mini-btn" onclick="moveRuleWithinState('${stateId}', ${idx}, -1)">▲</button>
          <button class="rule-mini-btn" onclick="moveRuleWithinState('${stateId}', ${idx}, 1)">▼</button>
          <button class="rule-mini-btn warn" onclick="deleteRule('${stateId}', ${idx})">削除</button>
        </div>
        <div class="nl-line">
          <span class="nl-token">Band</span>
          <select class="rule-select" onchange="setRuleBand('${stateId}', ${idx}, this.value)">
            ${buildBandOptions(rule.requiredBand)}
          </select>
          <span class="nl-token">が</span>
          <input class="rule-input" style="max-width:110px;" type="number" min="0" step="0.1" value="${Number(rule.bandDuration)}" onchange="setRuleDuration('${stateId}', ${idx}, this.value)">
          <span class="nl-token">秒以上</span>
        </div>
        <div class="nl-line">
          <span class="nl-token">メモ</span>
          <input class="rule-input" type="text" value="${escHtml(rule.note || "")}" onchange="setRuleNote('${stateId}', ${idx}, this.value)">
        </div>
        <div class="nl-line" style="display:block;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">もし次をすべて満たすなら（AND）</div>
          ${conds || '<div style="font-size:11px;color:var(--muted);">条件なし</div>'}
          <div style="margin-top:6px;">
            <button class="rule-mini-btn" onclick="addRuleCondition('${stateId}', ${idx})">＋ 条件追加</button>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function refreshAfterRuleEdit() {
  if (bridgeMode) rebuildStatesFromBridgeRules();
  persistBridgeDraft();
  drawArrows(selectedId ? ((arrowIdxMap[selectedId] || []).concat(arrowData.filter(a => a.to === selectedId).map(a => a.key))) : []);
  if (selectedId) renderPanel(selectedId);
}

function addRuleFromState(fromState) {
  if (!bridgeMode) return;
  bridgeRules.push(normalizeRule({
    enabled: true,
    note: "",
    fromState,
    toState: "Defensive",
    requiredBand: "Any",
    bandDuration: 0,
    conditions: []
  }));
  refreshAfterRuleEdit();
}

function moveRuleWithinState(stateId, idx, dir) {
  if (!bridgeMode) return;
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule) return;
  const gi = bridgeRules.indexOf(rule);
  if (gi < 0) return;

  let target = -1;
  if (dir < 0) {
    for (let i = gi - 1; i >= 0; i--) {
      if (bridgeRules[i].fromState === rule.fromState) { target = i; break; }
    }
  } else {
    for (let i = gi + 1; i < bridgeRules.length; i++) {
      if (bridgeRules[i].fromState === rule.fromState) { target = i; break; }
    }
  }
  if (target < 0) return;
  const tmp = bridgeRules[target];
  bridgeRules[target] = bridgeRules[gi];
  bridgeRules[gi] = tmp;
  refreshAfterRuleEdit();
}

function deleteRule(stateId, idx) {
  if (!bridgeMode) return;
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule) return;
  const i = bridgeRules.indexOf(rule);
  if (i >= 0) bridgeRules.splice(i, 1);
  refreshAfterRuleEdit();
}

function setRuleEnabled(stateId, idx, checked) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule) return;
  rule.enabled = !!checked;
  refreshAfterRuleEdit();
}

function setRuleToState(stateId, idx, value) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule || !STATES[value]) return;
  rule.toState = value;
  refreshAfterRuleEdit();
}

function setRuleBand(stateId, idx, value) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule || !BAND_LABEL[value]) return;
  rule.requiredBand = value;
  refreshAfterRuleEdit();
}

function setRuleDuration(stateId, idx, value) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule) return;
  const n = Number(value);
  if (!Number.isFinite(n)) return;
  rule.bandDuration = Math.max(0, n);
  refreshAfterRuleEdit();
}

function setRuleNote(stateId, idx, value) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule) return;
  rule.note = String(value || "");
  refreshAfterRuleEdit();
}

function addRuleCondition(stateId, idx) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule) return;
  if (!Array.isArray(rule.conditions)) rule.conditions = [];
  rule.conditions.push({ param: "Arousal", op: "GreaterEqual", threshold: sanitizeThreshold("Arousal", 0.5) });
  refreshAfterRuleEdit();
}

function removeRuleCondition(stateId, idx, cidx) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule || !Array.isArray(rule.conditions) || !rule.conditions[cidx]) return;
  rule.conditions.splice(cidx, 1);
  refreshAfterRuleEdit();
}

function setConditionParam(stateId, idx, cidx, value) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule || !Array.isArray(rule.conditions) || !rule.conditions[cidx]) return;
  const param = PARAM_LABEL[value] ? value : "Arousal";
  rule.conditions[cidx].param = param;
  rule.conditions[cidx].threshold = sanitizeThreshold(param, rule.conditions[cidx].threshold);
  refreshAfterRuleEdit();
}

function setConditionOp(stateId, idx, cidx, value) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule || !Array.isArray(rule.conditions) || !rule.conditions[cidx]) return;
  rule.conditions[cidx].op = OP_LABEL[value] ? value : "GreaterEqual";
  refreshAfterRuleEdit();
}

function setConditionThreshold(stateId, idx, cidx, value) {
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule || !Array.isArray(rule.conditions) || !rule.conditions[cidx]) return;
  const param = rule.conditions[cidx].param || "Arousal";
  rule.conditions[cidx].threshold = sanitizeThreshold(param, value);
  refreshAfterRuleEdit();
}

function openRuleEditor(stateId, idx) {
  if (!bridgeMode) return;
  const rule = findBridgeRuleByStateIndex(stateId, idx);
  if (!rule) return;

  const enabledIn = window.prompt("enabled (true/false)", String(rule.enabled));
  if (enabledIn === null) return;
  rule.enabled = enabledIn.trim().toLowerCase() !== "false";

  const toIn = window.prompt(`toState (${STATE_IDS.join(", ")})`, rule.toState);
  if (toIn === null) return;
  const toNorm = stateIdFromAny(toIn.trim());
  if (STATES[toNorm]) rule.toState = toNorm;

  const bandIn = window.prompt("requiredBand (Any/Stop/Below/Within/Above)", rule.requiredBand);
  if (bandIn === null) return;
  if (BAND_LABEL[bandIn.trim()]) rule.requiredBand = bandIn.trim();

  const durIn = window.prompt("bandDuration (seconds)", String(rule.bandDuration));
  if (durIn === null) return;
  const durN = Number(durIn);
  if (Number.isFinite(durN)) rule.bandDuration = Math.max(0, durN);

  const noteIn = window.prompt("note", rule.note || "");
  if (noteIn === null) return;
  rule.note = noteIn;

  const condJsonCurrent = JSON.stringify(rule.conditions, null, 2);
  const condIn = window.prompt(
    "conditions(JSON): [{\"param\":\"Arousal\",\"op\":\"GreaterEqual\",\"threshold\":0.5}]",
    condJsonCurrent
  );
  if (condIn === null) return;
  try {
    const parsed = JSON.parse(condIn);
    if (Array.isArray(parsed)) {
      rule.conditions = parsed.map(c => ({
        param: PARAM_LABEL[c.param] ? c.param : "Arousal",
        op: OP_LABEL[c.op] ? c.op : "GreaterEqual",
        threshold: Number.isFinite(Number(c.threshold)) ? Number(c.threshold) : 0.5
      }));
    }
  } catch (e) {
    alert("conditions JSON parse失敗のため、既存値を維持します。");
  }

  refreshAfterRuleEdit();
}

function exportBridgeJson() {
  if (!bridgeMode) {
    alert("Bridge JSON未読込です。先に Unity Bridge JSON を読み込んでください。");
    return;
  }
  const root = {
    version: "state-machine-bridge-v1",
    rules: bridgeRules.map(r => ({
      enabled: r.enabled,
      note: r.note || "",
      fromState: enumStateFromId(r.fromState),
      toState: enumStateFromId(r.toState),
      requiredBand: r.requiredBand,
      bandDuration: r.bandDuration,
      conditions: (r.conditions || []).map(c => ({
        param: c.param,
        op: c.op,
        threshold: c.threshold
      }))
    }))
  };
  const blob = new Blob([JSON.stringify(root, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "state_machine_bridge.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadBridgeJsonText(text) {
  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e) {
    alert("JSON解析に失敗しました。");
    return;
  }
  const rules = Array.isArray(parsed.rules) ? parsed.rules : null;
  if (!rules) {
    alert("rules 配列が見つかりません。");
    return;
  }
  bridgeRules = rules.map(r => normalizeRule(r)).filter(r => STATES[r.fromState] && STATES[r.toState]);
  bridgeMode = true;
  rebuildStatesFromBridgeRules();
  persistBridgeDraft();
  drawArrows();
  if (selectedId) renderPanel(selectedId);
  updateBridgeStatus(`StateTransitionConfig同期中（${bridgeRules.length} rules）`);
}

// ─── パン & ズーム ─────────────────────────────────────────
const canvasEl = document.getElementById('canvas');
const innerEl = document.getElementById('canvas-inner');
let scale = 0.55, tx = 40, ty = 20;
let dragging = false, startX, startY, startTx, startTy;

function applyTransform() {
  innerEl.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}
applyTransform();

canvasEl.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  dragging = true; startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => dragging = false);

canvasEl.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const rect = canvasEl.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  tx = mx - (mx - tx) * delta;
  ty = my - (my - ty) * delta;
  scale = Math.max(0.2, Math.min(2.0, scale * delta));
  applyTransform();
}, { passive: false });

document.getElementById('zoom-in').onclick = () => { scale = Math.min(2.0, scale * 1.15); applyTransform(); };
document.getElementById('zoom-out').onclick = () => { scale = Math.max(0.2, scale * 0.87); applyTransform(); };
document.getElementById('zoom-reset').onclick = () => { scale = 0.55; tx = 40; ty = 20; applyTransform(); };

// ─── Side Panel Resize ─────────────────────────────────────
const panelSplitter = document.getElementById("panel-splitter");
let resizingPanel = false;
let startXPanel = 0;
let startPanelW = 0;

function setPanelWidth(px) {
  const w = Math.max(360, Math.min(780, Math.round(px)));
  document.documentElement.style.setProperty("--panel-w", `${w}px`);
  try { localStorage.setItem("state_machine_panel_w", String(w)); } catch (_) {}
}

try {
  const savedW = Number(localStorage.getItem("state_machine_panel_w"));
  if (Number.isFinite(savedW) && savedW > 0) setPanelWidth(savedW);
} catch (_) {}

panelSplitter.addEventListener("mousedown", (e) => {
  resizingPanel = true;
  startXPanel = e.clientX;
  const current = getComputedStyle(document.documentElement).getPropertyValue("--panel-w").trim().replace("px", "");
  startPanelW = Number(current) || 520;
  document.body.style.userSelect = "none";
});

window.addEventListener("mousemove", (e) => {
  if (!resizingPanel) return;
  const dx = startXPanel - e.clientX;
  setPanelWidth(startPanelW + dx);
});

window.addEventListener("mouseup", () => {
  if (!resizingPanel) return;
  resizingPanel = false;
  document.body.style.userSelect = "";
});

// ─── Bridge JSON UI ────────────────────────────────────────
const bridgeFileInput = document.getElementById("bridge-file-input");
const tolBridgeFileInput = document.getElementById("tol-bridge-file-input");
document.getElementById("btn-load-bridge").addEventListener("click", () => bridgeFileInput.click());
document.getElementById("btn-export-bridge").addEventListener("click", exportBridgeJson);
document.getElementById("btn-reset-static").addEventListener("click", () => {
  resetToStaticTransitions();
  drawArrows();
  if (selectedId) renderPanel(selectedId);
});
bridgeFileInput.addEventListener("change", (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => loadBridgeJsonText(String(reader.result || ""));
  reader.readAsText(file, "utf-8");
  bridgeFileInput.value = "";
});
tolBridgeFileInput.addEventListener("change", (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result || "{}"));
      const count = applyTolBridgeRoot(parsed);
      if (count <= 0) {
        alert("Tolデータ（states[].tolLow/tolHigh）が見つかりません。");
      } else if (selectedId) {
        renderPanel(selectedId);
      }
    } catch (_) {
      alert("Tol JSON解析に失敗しました。");
    }
  };
  reader.readAsText(file, "utf-8");
  tolBridgeFileInput.value = "";
});

// ─── 初期描画 ────────────────────────────────────────────────
tryRestoreTolDraft();
if (!tryRestoreBridgeDraft()) {
  resetToStaticTransitions();
}
rebuildArrowsFromStates();
drawArrows();
</script>
